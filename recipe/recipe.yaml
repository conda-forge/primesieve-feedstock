context:
  version: "12.13"

package:
  name: primesieve
  version: ${{ version }}

source:
  url: https://github.com/kimwalisch/primesieve/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4cd3f1b70f6b02d695e6495e6a0fc0fa99b4dc043e0f21686d2cf409e98295c9
  patches:
    # avoid primesieve.dll.lib
    - import.patch

build:
  number: 1

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
  run_exports:
    - ${{ pin_subpackage('primesieve', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - primesieve.h
      lib:
        - primesieve
  - script:
      # Test CLIs.
      - primesieve -n 1

about:
  homepage: http://primesieve.org/
  license: BSD-2-Clause
  license_file: COPYING
  summary: Fast C/C++ prime number generator

extra:
  recipe-maintainers:
    - jakirkham
    - jschueller
